<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Job Category Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f7f8fa;
    --card:     #ffffff;
    --border:   #e8eaef;
    --border2:  #d0d5de;
    --text:     #111827;
    --sub:      #6b7280;
    --faint:    #9ca3af;

    --blue:     #2563eb;
    --blue-bg:  #eff6ff;
    --blue-bd:  #bfdbfe;

    --teal:     #0d9488;
    --teal-bg:  #f0fdfa;
    --teal-bd:  #99f6e4;

    --violet:   #7c3aed;
    --violet-bg:#f5f3ff;
    --violet-bd:#ddd6fe;

    --amber:    #b45309;
    --amber-bg: #fffbeb;
    --amber-bd: #fde68a;

    --green:    #16a34a;
    --green-bg: #f0fdf4;
    --green-bd: #bbf7d0;

    --slate-bg: #f1f5f9;
    --slate-bd: #cbd5e1;
    --slate-tx: #475569;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Figtree', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Top bar */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-logo {
    width: 28px; height: 28px;
    background: var(--blue);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .topbar-logo svg { width: 14px; height: 14px; fill: white; }

  .topbar-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }

  .topbar-divider {
    width: 1px; height: 18px;
    background: var(--border2);
    margin: 0 4px;
  }

  .topbar-sub {
    font-size: 0.82rem;
    color: var(--sub);
    font-weight: 400;
  }

  /* Layout */
  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  .hero {
    margin-bottom: 36px;
  }

  h1 {
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .hero-sub {
    font-size: 0.92rem;
    color: var(--sub);
    font-weight: 400;
  }

  /* Search */
  .search-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .search-box {
    position: relative;
    flex: 1;
  }

  .search-box svg {
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px; height: 15px;
    color: var(--faint);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border2);
    border-radius: 10px;
    padding: 11px 40px 11px 38px;
    font-family: 'Figtree', sans-serif;
    font-size: 0.92rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #search::placeholder { color: var(--faint); }
  #search:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
  }

  .clear-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--faint);
    padding: 4px;
    display: none;
    border-radius: 4px;
    line-height: 1;
    font-size: 14px;
    transition: color 0.1s;
  }
  .clear-btn:hover { color: var(--sub); }
  .clear-btn.visible { display: flex; }

  /* Meta row */
  .meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    font-size: 0.8rem;
    color: var(--sub);
  }

  .result-count { font-weight: 600; color: var(--blue); }

  /* Cards */
  #results { display: flex; flex-direction: column; gap: 2px; }

  .job-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.12s;
    animation: up 0.18s ease both;
  }

  @keyframes up {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .job-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .job-card.expanded { border-color: var(--blue-bd); box-shadow: 0 2px 12px rgba(37,99,235,0.08); }

  .card-top {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
  }

  .card-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    background: var(--blue-bg);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-icon svg { width: 15px; height: 15px; color: var(--blue); }

  .card-info { flex: 1; min-width: 0; }

  .card-title {
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 5px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.72rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 5px;
    white-space: nowrap;
  }

  .pill-cc   { background: var(--slate-bg); color: var(--slate-tx); border: 1px solid var(--slate-bd); }
  .pill-app  { background: var(--teal-bg);  color: var(--teal);     border: 1px solid var(--teal-bd); }
  .pill-dept { background: var(--violet-bg);color: var(--violet);   border: 1px solid var(--violet-bd); }
  .pill-none { background: var(--amber-bg); color: var(--amber);    border: 1px solid var(--amber-bd); }

  .cat-count {
    font-size: 0.72rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 5px;
    background: var(--blue-bg);
    color: var(--blue);
    border: 1px solid var(--blue-bd);
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: auto;
  }
  .cat-count.none {
    background: var(--slate-bg);
    color: var(--slate-tx);
    border-color: var(--slate-bd);
  }

  .chevron {
    color: var(--faint);
    transition: transform 0.2s, color 0.15s;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .chevron svg { width: 14px; height: 14px; display: block; }
  .job-card.expanded .chevron { transform: rotate(180deg); color: var(--blue); }

  /* Detail panel */
  .card-detail {
    display: none;
    border-top: 1px solid var(--border);
    background: #fafbfc;
    padding: 16px 16px 16px 62px;
  }
  .job-card.expanded .card-detail { display: block; }

  .detail-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 10px;
  }

  .cat-item {
    padding: 13px 14px;
    border-radius: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    margin-bottom: 8px;
    border-left: 3px solid var(--blue);
  }

  .cat-item:nth-child(2) { border-left-color: var(--teal); }
  .cat-item:nth-child(3) { border-left-color: var(--violet); }
  .cat-item:nth-child(4) { border-left-color: var(--amber); }

  .cat-name {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
  }

  .cat-desc {
    font-size: 0.8rem;
    color: var(--sub);
    line-height: 1.6;
    white-space: pre-line;
  }

  .no-cats {
    font-size: 0.83rem;
    color: var(--faint);
    font-style: italic;
    padding: 4px 0;
  }

  /* Highlight */
  mark {
    background: #fef9c3;
    color: #854d0e;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* Empty */
  .empty {
    text-align: center;
    padding: 72px 24px;
    color: var(--sub);
  }
  .empty-icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.35; }
  .empty p { font-size: 0.88rem; line-height: 1.6; }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-top: 28px;
  }

  .page-btn {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 7px;
    color: var(--sub);
    padding: 7px 12px;
    font-family: 'Figtree', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.12s;
    line-height: 1;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--blue); }
  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .page-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: white;
    font-weight: 600;
  }
  .page-dots { color: var(--faint); font-size: 0.82rem; padding: 0 4px; }
</style>
</head>

bTitle": "Supp Srvc Rep III Chrg Entry", "costCenter": "5811", "department": "FPG Central Billing Office", "application": "Professional Billing", "categories": [{"name": "Coder - Professional Billing", "desc": "Works charge errors prior to billing, works insurance follow-up coding denials or edits during claim processing, enters charges manually.\n\nDoes not perform non-coding tasks."}]}, {"jobTitle": "Sr Manager Patient Accounts", "costCenter": "7045", "department": "Patient Financial Services", "application": "Hospital Billing", "categories": [{"name": "Payment Posting Supervisor - SBO", "desc": "Monitors key payment posting metrics, runs productivity reports."}, {"name": "Billing Office Director - Hospital Billing", "desc": "Monitors billing office performance and metrics; reports on productivity; reviews and edits accounts, charges, claims, and transactions; approves and declines adjustments; posts payments; updates account history; takes actions on accounts."}, {"name": "Indexer - with Gallery - Outside HIM", "desc": "Batch scans and indexes documents outside the HIM department."}, {"name": "Self-Pay - Call Management - Enhancement", "desc": "Uses CRM functionality to document patient calls.\n\nConsiderations: Do not assign this as a primary job category."}]}, {"jobTitle": "Mgr Bus Dev & Marketing (FPG)", "costCenter": "5810", "department": "FPG Administration", "application": "Anesthesia", "categories": [{"name": "Manager - Perioperative", "desc": "Increases perioperative efficiency, accesses intraprocedure nursing documentation if needed."}, {"name": "CXO", "desc": "Accesses Epic primarily for reporting using executive and management-level reports and dashboards, uses high level data to make enterprise decisions."}]}, {"jobTitle": "Director Organizational Dev", "costCenter": "7010", "department": "Human Resources", "application": "No Access or Training Needed", "categories": []}, {"jobTitle": "Associate Project Coordinator", "costCenter": "7025", "department": "Information Systems", "application": "No Access or Training Needed", "categories": []}, {"jobTitle": "MRI Technologist Registered", "costCenter": "3249", "department": "MRI VNA", "application": "Radiant", "categories": [{"name": "Technologist - Breast Imaging Radiology", "desc": "Reviews patient history, documents breast-related problems, performs breast imaging exams, accesses follow-up tracking tools and reports.\n\nDoes not result imaging studies."}]}, {"jobTitle": "Manager Cat Scan/Rad Quality", "costCenter": "3327", "department": "Radiology Administration", "application": "Radiant", "categories": [{"name": "Manager - Radiology", "desc": "Monitors department productivity, performs correction workflows, oversees reporting of imaging locations, tracks and follows-up on critical results.\n\nDoes not schedule, perform, or result imaging procedures."}, {"name": "Lead Technologist - Diagnostic Radiology", "desc": "Performs technologist workflows, monitors productivity, performs correction workflows, oversees reporting for diagnostic imaging exams."}]}, {"jobTitle": "Haugland APRN Joanne", "costCenter": "901307", "department": "Adv Prac Reg Nurse I PRN", "application": "EpicCare Ambulatory", "categories": [{"name": "Nurse Practitioner - Internal/Family Medicine - Outpatient", "desc": "Provides comprehensive care to people of all ages, completes clinic visits and in-office procedures."}]}, {"jobTitle": "Talent Onboarding Spec PRN", "costCenter": "7010", "department": "Human Resources", "application": "No Access or Training Needed", "categories": []}, {"jobTitle": "Credentials Analyst Sr", "costCenter": "7060", "department": "Medical Staff", "application": "No Access or Training Needed", "categories": []}, {"jobTitle": "Director Risk Management", "costCenter": "7088", "department": "Quality Risk Management", "application": "Inpatient EMR", "categories": [{"name": "Abstractor - Quality Assurance", "desc": "Documents quality measures, abstracts charts, runs reports.\n\nDoes not provide direct patient care unless this role is being performed by someone who is also a nurse or other care provider."}]}, {"jobTitle": "Manager Clinical Programs", "costCenter": "7197", "department": "Disease Specific Programs", "application": "EpicCare Ambulatory", "categories": [{"name": "Nurse Manager - Inpatient", "desc": "Reviews documentation to ensure compliance with guidelines, uses reporting tools to monitor effectiveness of individual nurses and the unit, and identifies where issues with patient care might need to be addressed.\n\nDoes not typically provide patient care.\n\nConsiderations: This primary category is for inpatient nurse managers with a specialty not covered by another job category."}, {"name": "Power User - Reporting - Enhancement", "desc": "Runs reports, presents and analyzes data, uses and personalizes Cogito tools, performs a variety of analytical and non-analytical tasks.\n\nDoes not perform administrative tasks.\n\nConsiderations: Do not assign this as a primary job category."}]}, {"jobTitle": "Legal Ops/Contracts Paralegal", "costCenter": "7087", "department": "Legal Affairs", "application": "No Access or Training Needed", "categories": []}, {"jobTitle": "Operations Mgr Hospitality", "costCenter": "7180", "department": "Environmental Services", "application": "Grand Central", "categories": [{"name": "Supervisor/Lead - Environmental Services", "desc": "Cleans beds and patient rooms, completes other housekeeping tasks while also managing EVS staff, monitoring volume, turnaround, and staff performance, and performing cleaning inspections.\n\nDoes not transport patients or equipment, admit patients, discharge patients, transfer patients, assign patients to beds or rooms, or monitor patient flow/capacity."}]}];
const PER = 20;
let filtered = DATA, page = 1, query = '', expanded = null;

function esc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function hl(t,q){ return q ? t.replace(new RegExp('('+esc(q)+')','gi'),'<mark>$1</mark>') : t; }

function render(){
  const el = document.getElementById('results');
  const total = Math.max(1, Math.ceil(filtered.length / PER));
  const start = (page-1)*PER;
  const slice = filtered.slice(start, start+PER);

  if(!filtered.length){
    el.innerHTML = `<div class="empty"><div class="empty-icon">&#128269;</div><p>No results for <strong>"${query}"</strong>.<br>Try different keywords.</p></div>`;
    document.getElementById('pagination').innerHTML='';
    return;
  }

  el.innerHTML = slice.map((j,i)=>{
    const cats = j.categories;
    const hasApp = j.application && j.application !== 'No Access or Training Needed';
    const appPill = hasApp ? `<span class="pill pill-app">${j.application}</span>` : '';
    const deptPill = j.department ? `<span class="pill pill-dept">${hl(j.department,query)}</span>` : '';
    const ccPill = j.costCenter ? `<span class="pill pill-cc">CC ${j.costCenter}</span>` : '';
    const catBadge = cats.length
      ? `<span class="cat-count">${cats.length} categor${cats.length>1?'ies':'y'}</span>`
      : `<span class="cat-count none">No category</span>`;

    const detail = cats.length
      ? cats.map(c=>`<div class="cat-item"><div class="cat-name">${c.name}</div>${c.desc?`<div class="cat-desc">${c.desc}</div>`:''}</div>`).join('')
      : `<p class="no-cats">No Epic job category assigned to this role.</p>`;

    return `<div class="job-card" id="c${start+i}" onclick="toggle(${start+i})" style="animation-delay:${i*.02}s">
      <div class="card-top">
        <div class="card-icon">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.7">
            <circle cx="10" cy="7" r="3"/><path d="M4 17c0-3.3 2.7-6 6-6s6 2.7 6 6" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="card-info">
          <div class="card-title">${hl(j.jobTitle,query)}</div>
          <div class="card-pills">${ccPill}${appPill}${deptPill}</div>
        </div>
        ${catBadge}
        <div class="chevron"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg></div>
      </div>
      <div class="card-detail">
        <div class="detail-label">Epic Job Categories</div>
        ${detail}
      </div>
    </div>`;
  }).join('');

  document.getElementById('resultText').innerHTML = query
    ? `<span class="result-count">${filtered.length.toLocaleString()}</span> result${filtered.length!==1?'s':''} for "<strong>${query}</strong>"`
    : `All <span class="result-count">${filtered.length.toLocaleString()}</span> titles`;
  document.getElementById('pageInfo').textContent = filtered.length>PER ? `Page ${page} of ${total}` : '';
  renderPages(total);
}

function toggle(id){
  const c = document.getElementById('c'+id);
  if(!c) return;
  if(expanded && expanded!==c) expanded.classList.remove('expanded');
  c.classList.toggle('expanded');
  expanded = c.classList.contains('expanded') ? c : null;
  if(expanded) setTimeout(()=>c.scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}

function renderPages(total){
  const el = document.getElementById('pagination');
  if(total<=1){el.innerHTML='';return;}
  const nums = total<=7 ? [...Array(total)].map((_,i)=>i+1)
    : page<=4 ? [1,2,3,4,5,'…',total]
    : page>=total-3 ? [1,'…',total-4,total-3,total-2,total-1,total]
    : [1,'…',page-1,page,page+1,'…',total];
  el.innerHTML =
    `<button class="page-btn" onclick="go(${page-1})" ${page===1?'disabled':''}>&#8592;</button>` +
    nums.map(n=>n==='…'?`<span class="page-dots">…</span>`:`<button class="page-btn${n===page?' active':''}" onclick="go(${n})">${n}</button>`).join('') +
    `<button class="page-btn" onclick="go(${page+1})" ${page===total?'disabled':''}>&#8594;</button>`;
}

function go(p){
  const total=Math.ceil(filtered.length/PER);
  if(p<1||p>total)return;
  page=p; expanded=null; render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function clearSearch(){
  document.getElementById('search').value='';
  query=''; filtered=DATA; page=1; expanded=null;
  document.getElementById('clearBtn').classList.remove('visible');
  render();
}

let tmr;
document.getElementById('search').addEventListener('input',function(){
  clearTimeout(tmr);
  tmr=setTimeout(()=>{
    query=this.value.trim();
    document.getElementById('clearBtn').classList.toggle('visible',query.length>0);
    const q=query.toLowerCase();
    filtered=query ? DATA.filter(j=>
      j.jobTitle.toLowerCase().includes(q)||
      (j.department&&j.department.toLowerCase().includes(q))||
      (j.application&&j.application.toLowerCase().includes(q))||
      j.categories.some(c=>c.name.toLowerCase().includes(q))
    ) : DATA;
    page=1; expanded=null; render();
  },150);
});

render();
</script>
